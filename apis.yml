aid: contrast-security
name: Contrast Security
description: >-
  Contrast Security is an application security platform that uses
  instrumentation-based agents to provide Interactive Application Security
  Testing (IAST), Runtime Application Self-Protection (RASP), and Software
  Composition Analysis (SCA) across Java, .NET, Node.js, Python, PHP, Go,
  and Ruby applications. The platform identifies, prioritizes, and defends
  against vulnerabilities and attacks in real time from inside running
  applications. Contrast's REST API enables programmatic access to
  TeamServer applications, libraries, vulnerabilities, and traces,
  authenticated via API key plus Authorization header (Base64 of
  username:service_key) and an Organization ID.
